<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pressure Vessel Inspection Map</title>

<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
}

#map {
  position: absolute;
  top: 0; bottom: 0; left: 0; right: 0;
}

/* ==============================
   NAVIGATION PANEL
============================== */
#navMenu {
  position: absolute;
  top: 15px;
  right: 15px;
  z-index: 9999;
  background: rgba(255,255,255,0.9);
  padding: 10px 14px;
  border-radius: 8px;
  box-shadow: 0 0 8px rgba(0,0,0,0.25);
  font-family: Arial, sans-serif;
}

#navMenu button {
  margin: 3px;
  padding: 6px 10px;
  border: none;
  background: #0078ff;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
}

#navMenu button:hover {
  background: #005fcc;
}

/* ==============================
   SEARCH BAR
============================== */
#searchBar { 
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  background: rgba(255,255,255,0.95);
  padding: 12px 16px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.25);
  display: flex;
  gap: 8px;
  align-items: center;
  font-family: Arial, sans-serif;
}

#searchBar select, #searchBar input { 
  padding: 6px 8px;
  font-size: 14px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

#searchBar button { 
  padding: 6px 12px;
  background: #0078ff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#searchBar button:hover { 
  background: #005fcc;
}

/* ==============================
   INSPECTION FORM (FLOATING)
============================== */
#inspectionForm {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2000;
  background: white;
  padding: 20px;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.4);
  display: none;
}

#inspectionForm h3 {
  margin-top: 0;
}

#inspectionForm label {
  font-weight: bold;
  display: block;
  margin-top: 10px;
}

#inspectionForm textarea,
#inspectionForm select {
  width: 100%;
  margin-top: 5px;
}

#inspectionForm button {
  padding: 6px 12px;
  background: #0078ff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#submitInspection {
  background: #0078ff;
  color: white;
}

#cancelInspection {
  background: #aaa;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="navMenu">
  <button id="prevBtn">◀ Previous</button>
  <button id="nextBtn">Next ▶</button>
</div>

<div id="searchBar">
  <select id="searchType">
    <option value="name">Name</option>
    <option value="any">Any</option>
  </select>
  <input id="searchInput" placeholder="Search...">
  <button id="searchBtn">Search</button>
</div>

<div id="inspectionForm">
  <h3>Inspect Vessel</h3>

  <label>Condition</label>
  <select id="condition">
    <option value="good">Good</option>
    <option value="attention">Needs Attention</option>
    <option value="critical">Critical</option>
  </select>

  <label>Relief Valve OK?</label>
  <select id="relief">
    <option>Yes</option>
    <option>No</option>
  </select>

  <label>Notes</label>
  <textarea id="notes"></textarea>

  <button id="submitInspection">Submit</button>
  <button id="cancelInspection">Cancel</button>
</div>

<script>
/* ==============================
   STATUS COLOR LOGIC (BULLET 3A)
============================== */
function getStatusColor(daysUntilDue) {
  if (daysUntilDue < 0) return "red";
  if (daysUntilDue <= 30) return "yellow";
  return "blue";
}

/* ==============================
   MAP INIT
============================== */
const map = L.map('map').setView([40.473074, -75.894514], 22);

L.tileLayer(
  "https://api.maptiler.com/maps/hybrid-v4/{z}/{x}/{y}.jpg?key=UJ9UnOp3d8YHmGwmMr5E"
).addTo(map);

/* ==============================
   GLOBAL STATE
============================== */
const markers = [];
let currentMarkerIndex = 0;
let activeVessel = null;

/* ==============================
   POPUP BUILDER
============================== */
function buildPopup(v) {
  return `
    <b>${v.name}</b><br>
    Last inspection: ${v.lastInspection || "—"}<br>
    Days until due: ${v.daysUntilDue ?? "—"}<br><br>

    <button onclick="openInspectionForm('${v.id}')">Inspect</button>
  `;
}

/* ==============================
   ALLOWS US TO ADD VESSEL MARKERS
============================== */
function addVessel(lat, lng, vessel) {
  const color = getStatusColor(vessel.daysUntilDue);

  const marker = L.circleMarker([lat, lng], {
    radius: 4,
    color: color,
    fillColor: color,
    fillOpacity: 0.9
  }).addTo(map);

  marker.data = vessel;
  marker.bindPopup(buildPopup(vessel));
  markers.push(marker);
}

/* ==============================
   LOAD VESSELS FROM CSV
============================== */
fetch("Vessels.csv")
  .then(response => response.text())
  .then(text => {
    const lines = text.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim());

    function rowToObject(line) {
      const values = line.split(",").map(v => v.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = values[i]);
      return obj;
    }

    lines.slice(1).forEach(line => {
      if (!line.trim()) return;

      const row = rowToObject(line);

      const vessel = {
        id: row["PR1 EQUIP. #"] || row["PRS EQUIP. #"] || row["#"],
        name: row["PLANT LOCATION"],

        nationalId: row["NATIONAL NUMBER"],
        paNumber: row["PA NUMBER"],
        plantLocation: row["AREA"],
        psiCfm: row["PSI/CFM"],
        reliefValveModel: row["Relief valve Model #"],
        threadSize: row["Thread Size (in)"],
        manufacturer: row["MFG. INFORMATION"],
        certExpiration: row["Cert. Expiration"],

        lat: parseFloat(row["Latitude"]),
        lng: parseFloat(row["Longitude"]),

        inspections: [],
        inspectionIntervalDays: 365,
        lastInspection: "—",
        daysUntilDue: 0
      };

      console.log("Loaded vessel:", vessel);
      addVessel(vessel.lat, vessel.lng, vessel);
    });
  })
  .catch(err => console.error("Error loading CSV:", err));
  
/* ==============================
   INSPECTION FORM HANDLERS
============================== */
function openInspectionForm(id) {
  activeVessel = id;
  document.getElementById("inspectionForm").style.display = "block";
}

document.getElementById("cancelInspection").onclick = () => {
  document.getElementById("inspectionForm").style.display = "none";
};

document.getElementById("submitInspection").onclick = () => {
  alert("Inspection recorded (simulation only)");
  document.getElementById("inspectionForm").style.display = "none";
};

/* =====================================================
   DATE / INSPECTION UTILITIES
===================================================== */
function daysBetween(date1, date2) {
    const msPerDay = 24 * 60 * 60 * 1000;
    return Math.floor((date2 - date1) / msPerDay);
}

function today() {
    return new Date(new Date().toDateString());
}

/* =====================================================
   UPDATE MARKER COLOR + POPUP
===================================================== */
function refreshMarker(marker) {
    const v = marker.data;
    const color = getStatusColor(v.daysUntilDue);

    marker.setStyle({
        color: color,
        fillColor: color
    });

    marker.setPopupContent(buildPopup(v));
}

/* =====================================================
   INSPECTION FORM HOOKUP — REPLACE OLD HANDLER
===================================================== */
document.getElementById("submitInspection").onclick = () => {

    // locate vessel + marker
    const marker = markers.find(m => m.data.id === activeVessel);
    if (!marker) return;

    const vessel = marker.data;

    // simulated inspection result
    vessel.lastInspection = today().toISOString().split("T")[0];
    vessel.inspectionIntervalDays = 365; // example annual inspection

    // recompute due status
    const last = new Date(vessel.lastInspection);
    const due = new Date(last);
    due.setDate(due.getDate() + vessel.inspectionIntervalDays);

    vessel.daysUntilDue = daysBetween(today(), due);

    // update UI
    refreshMarker(marker);

    // close form
    document.getElementById("inspectionForm").style.display = "none";

    alert(
        `Inspection saved for ${vessel.name}\n` +
        `Days until next due: ${vessel.daysUntilDue}`
    );
};

/* =====================================================
   MARKER NAVIGATION (SAME STYLE AS PART 1)
===================================================== */
function focusMarker(index) {
    const marker = markers[index];
    if (!marker) return;

    map.panTo(marker.getLatLng());
    marker.openPopup();
}

document.getElementById("nextBtn").onclick = () => {
    currentMarkerIndex = (currentMarkerIndex + 1) % markers.length;
    focusMarker(currentMarkerIndex);
};

document.getElementById("prevBtn").onclick = () => {
    currentMarkerIndex =
        (currentMarkerIndex - 1 + markers.length) % markers.length;
    focusMarker(currentMarkerIndex);
};

/* =====================================================
   SEARCH LOGIC (WORKING)
===================================================== */
document.getElementById("searchBtn").onclick = () => {
    const txt = document.getElementById("searchInput").value.toLowerCase();

    if (!txt) return;

    for (let i = 0; i < markers.length; i++) {
        if (markers[i].data.name.toLowerCase().includes(txt)) {
            currentMarkerIndex = i;
            focusMarker(i);
            return;
        }
    }

    alert("No vessel found");
};

</script>
</body>
</html>
